# Hakoba — local dev registry (Verdaccio).
# Local-dev simple: anonymous publish/unpublish, everything else uplinked from npmjs.

storage: /verdaccio/storage

auth:
  htpasswd:
    file: /verdaccio/storage/htpasswd
    # -1 disables the signup endpoint; publishing is anonymous via $all below.
    max_users: -1

uplinks:
  npmjs:
    url: https://registry.npmjs.org/
    cache: true
    maxage: 30m

packages:
  '@*/*':
    access: $all
    publish: $all
    unpublish: $all
    proxy: npmjs
  '**':
    access: $all
    publish: $all
    unpublish: $all
    proxy: npmjs

# Serve the whole npmjs mirror; only locally-published packages are stored.
server:
  keepAliveTimeout: 60

log:
  type: stdout
  format: pretty
  level: warn
