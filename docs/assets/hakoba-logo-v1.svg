<svg  viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- True Monochrome Palette -->
    <!-- Primary Focus Box: The Connecting Bridge (High Contrast Deep Charcoal) -->
     <linearGradient id="PrimaryTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#ff4d4d"/>
    </linearGradient>
    <linearGradient id="PrimaryLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc1111"/>
      <stop offset="100%" stop-color="#cc1111"/>
    </linearGradient>
    <linearGradient id="PrimaryRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#990000"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>

    <!-- Secondary Structural Units: Pillar Boxes (Subdued Architectural Gray) -->
    <linearGradient id="SecondaryTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="SecondaryLeft" x1="0" y1="0" x2="0" y2="1">
     <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="SecondaryRight" x1="0" y1="0" x2="0" y2="1">
       <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>

    <linearGradient id="TertiaryTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16161a"/>
      <stop offset="100%" stop-color="#16161a"/>
    </linearGradient>
  </defs>

  <!-- Clean Canvas Background (Acting as the grid line colour peeking through) -->
  <rect width="512" height="512" rx="64" fill="#cbd5e1"/>

  <!-- ==================== SCALED & CENTRED CONSTRUCT GROUP ==================== -->
  <g transform="translate(28, 36) scale(0.90)">

    <!-- ==================== 3x3 TRUE ISOMETRIC SOLID GRID PLANES ==================== -->
    <!-- Scaled individually from their absolute isometric centers to ensure perfect channel alignment -->
    <g id="isometric-floor-tiles" fill="#e2e8f0">
      <!-- ROW 1 (Back Row) -->
      <polygon points="256,200 338,247 256,294 174,247" transform="translate(256, 247) scale(0.95) translate(-256, -247)"/> <!-- Cell 1,1 -->
      <polygon points="338,247 420,294 338,341 256,294" transform="translate(338, 294) scale(0.95) translate(-338, -294)"/> <!-- Cell 1,2 -->
      <polygon points="420,294 502,341 420,388 338,341" transform="translate(420, 341) scale(0.95) translate(-420, -341)"/> <!-- Cell 1,3 -->

      <!-- ROW 2 (Middle Row) -->
      <polygon points="174,247 256,294 174,341 92,294"  transform="translate(174, 294) scale(0.95) translate(-174, -294)"/> <!-- Cell 2,1 -->
      <polygon points="256,294 338,341 256,388 174,341" transform="translate(256, 341) scale(0.95) translate(-256, -341)"/> <!-- Cell 2,2 -->
      <polygon points="338,341 420,388 338,435 256,388" transform="translate(338, 388) scale(0.95) translate(-338, -388)"/> <!-- Cell 2,3 -->

      <!-- ROW 3 (Front Row) -->
      <polygon points="92,294  174,341 92,388  10,342"  transform="translate(92, 341)  scale(0.95) translate(-92, -341)"/>  <!-- Cell 3,1 -->
      <polygon points="174,341 256,388 174,435 92,388"  transform="translate(174, 388) scale(0.95) translate(-174, -388)"/> <!-- Cell 3,2 -->
      <polygon points="256,388 338,435 256,482 174,435" transform="translate(256, 435) scale(0.95) translate(-256, -435)"/> <!-- Cell 3,3 -->
    </g>

    <!-- ==================== 7-BOX VERTICAL "H" ASSEMBLY ==================== -->
    <!-- Pillar Box standard specifications: Base Width/Depth = 82px, Height = 94px -->

    <!-- BACK H PILLAR: 3 Boxes High (1st Column, 1st Row) -->
    <g id="left-pillar-level-3" transform="translate(-64, 64) scale(0.9)">
      <polygon points="174,341 174,247 92,200 92,294" fill="url(#SecondaryLeft)"/>
      <polygon points="174,341 174,247 256,200 256,294" fill="url(#SecondaryRight)"/>
      <polygon points="174,247 256,200 174,153 92,200" fill="url(#TertiaryTop)"/>
    </g>
    <g id="left-pillar-level-3" transform="translate(-64, -22) scale(0.9)">
      <polygon points="174,341 174,247 92,200 92,294" fill="url(#SecondaryLeft)"/>
      <polygon points="174,341 174,247 256,200 256,294" fill="url(#SecondaryRight)"/>
      <polygon points="174,247 256,200 174,153 92,200" fill="url(#TertiaryTop)"/>
    </g>
    <g id="left-pillar-level-3" transform="translate(-64, -108) scale(0.9)">
      <polygon points="174,341 174,247 92,200 92,294" fill="url(#SecondaryLeft)"/>
      <polygon points="174,341 174,247 256,200 256,294" fill="url(#SecondaryRight)"/>
      <polygon points="174,247 256,200 174,153 92,200" fill="url(#SecondaryTop)"/>
    </g>

    <!-- THE BRIDGE: PRIMARY FOCUS BOX (Scaled down to 80% and centered over middle cell) -->
    <g id="center-bridge-level-2" transform="translate(256, 267) scale(0.8)">
      <polygon points="0,47 0,-47 -82,-94 -82,0" fill="url(#PrimaryLeft)"/>
      <polygon points="0,47 0,-47 82,-94 82,0" fill="url(#PrimaryRight)"/>
      <polygon points="0,-47 82,-94 0,-141 -82,-94" fill="url(#PrimaryTop)"/>
    </g>

    <!-- FRONT H PILLAR: 3 Boxes High (3rd Column, 3rd Row) -->
    <g id="right-pillar-level-1" transform="translate(262, 64) scale(0.9)">
      <polygon points="174,341 174,247 92,200 92,294" fill="url(#SecondaryLeft)"/>
      <polygon points="174,341 174,247 256,200 256,294" fill="url(#SecondaryRight)"/>
      <polygon points="174,247 256,200 174,153 92,200" fill="url(#TertiaryTop)"/>
    </g>
    <g id="right-pillar-level-2" transform="translate(262, -22) scale(0.9)">
      <polygon points="174,341 174,247 92,200 92,294" fill="url(#SecondaryLeft)"/>
      <polygon points="174,341 174,247 256,200 256,294" fill="url(#SecondaryRight)"/>
      <polygon points="174,247 256,200 174,153 92,200" fill="url(#TertiaryTop)"/>
    </g>
    <g id="right-pillar-level-3" transform="translate(262, -108) scale(0.9)">
      <polygon points="174,341 174,247 92,200 92,294" fill="url(#SecondaryLeft)"/>
      <polygon points="174,341 174,247 256,200 256,294" fill="url(#SecondaryRight)"/>
      <polygon points="174,247 256,200 174,153 92,200" fill="url(#SecondaryTop)"/>
    </g>

  </g>
</svg>
